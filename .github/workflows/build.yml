name: Build and push devcontainer image

on:
  schedule:
    # 毎日 UTC 18:00 = JST 03:00 に走らせる
    - cron: '0 18 * * *'
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/claudecode-devcontainer

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ビルドしてローカルのDockerデーモンに読み込む（pushはまだしない）。
      # キャッシュを無効化することで、Claude Codeのインストールスクリプトを
      # 毎回最新の状態で実行させる。
      - name: Build (load locally, no push yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          no-cache: true
          tags: claudecode-devcontainer:tmp

      # 中身からClaude Codeのバージョンを取り出す。
      # 出力形式が変わってもセマンティックバージョン（X.Y.Z）の数字だけを拾えるようにしてある。
      - name: Detect Claude Code version
        id: ver
        run: |
          set -euo pipefail
          RAW=$(docker run --rm claudecode-devcontainer:tmp claude --version)
          echo "claude --version: $RAW"
          VERSION=$(echo "$RAW" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          if [ -z "$VERSION" ]; then
            echo "Failed to detect Claude Code version" >&2
            exit 1
          fi
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # すでに同じバージョンが公開済みならpushをスキップする。
      # 日次で走らせてもClaude Codeに更新がない日は何もしない。
      - name: Check whether this version is already published
        id: check
        run: |
          set -euo pipefail
          if docker manifest inspect "$IMAGE:${{ steps.ver.outputs.version }}" > /dev/null 2>&1; then
            echo "Already published: ${{ steps.ver.outputs.version }} — skipping push"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not yet published: ${{ steps.ver.outputs.version }}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and push
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          docker tag claudecode-devcontainer:tmp "$IMAGE:${{ steps.ver.outputs.version }}"
          docker tag claudecode-devcontainer:tmp "$IMAGE:latest"
          docker push "$IMAGE:${{ steps.ver.outputs.version }}"
          docker push "$IMAGE:latest"

      - name: Summary
        run: |
          echo "## Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Detected Claude Code version: \`${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            echo "- Push: **skipped** (already published)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Push: **done**" >> "$GITHUB_STEP_SUMMARY"
            echo "- Image: \`$IMAGE:${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Image: \`$IMAGE:latest\`" >> "$GITHUB_STEP_SUMMARY"
          fi
